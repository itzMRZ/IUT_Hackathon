# Nginx reverse proxy for Office Monitor on a VPS.
#
# Serves the built dashboard (dist/) as static files, and proxies:
#   /api/*  → the Node server's REST API
#   /ws     → the Node server's WebSocket (with upgrade headers)
#
# Install:
#   sudo cp nginx/office-monitor.conf /etc/nginx/sites-available/office-monitor
#   sudo ln -s /etc/nginx/sites-available/office-monitor /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then run `sudo certbot --nginx -d your-domain.com` to add HTTPS —
# certbot will rewrite this file to add the SSL server block automatically.

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;   # ← replace with your VPS domain or IP

    root /var/www/office-monitor/dist;   # ← path to this repo's `dist/` after `npm run build`
    index index.html;

    # Static dashboard — SPA fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API → Node server on localhost:3001
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket → Node server on localhost:3001
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;   # keep long-lived WS connections open
    }
}
